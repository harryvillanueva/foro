<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foro DAW - Inicio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-100 min-h-screen">

<nav class="bg-blue-900 text-white shadow-lg">
    <div class="max-w-7xl mx-auto px-4">
        <div class="flex justify-between items-center h-16">
            <div class="flex items-center space-x-2">
                <i class="fas fa-comments text-2xl"></i>
                <span class="font-bold text-xl tracking-tight">Foro DAW</span>
            </div>
            <div class="hidden md:flex items-center space-x-6" id="nav-links">
                <a href="index.html" class="hover:text-blue-300 transition"><i class="fas fa-home mr-1"></i> Inicio</a>
                <a href="admin_salas.html" id="link-admin-salas" class="hidden hover:text-blue-300 transition"><i class="fas fa-layer-group mr-1"></i> Gestión Salas</a>
                <a href="admin_moderadores.html" id="link-admin-mods" class="hidden hover:text-blue-300 transition"><i class="fas fa-user-shield mr-1"></i> Moderadores</a>
                <a href="moderacion.html" id="link-moderacion" class="hidden hover:text-blue-300 transition"><i class="fas fa-shield-halved mr-1"></i> Moderación</a>
                <a href="perfil.html" class="hover:text-blue-300 transition"><i class="fas fa-user mr-1"></i> Mi Perfil</a>
                <div class="flex items-center border-l border-blue-700 pl-6 space-x-4">
                    <span id="user-display" class="text-sm font-medium text-blue-200">Invitado</span>
                    <button id="btn-logout" class="bg-red-600 hover:bg-red-700 px-3 py-1 rounded text-sm transition"><i class="fas fa-sign-out-alt"></i> Salir</button>
                </div>
            </div>
        </div>
    </div>
</nav>

<main class="max-w-7xl mx-auto py-10 px-4">

    <section id="seccion-favoritos" class="mb-12 hidden">
        <h2 class="text-2xl font-bold text-orange-600 mb-6 flex items-center gap-2">
            <i class="fas fa-star text-orange-400"></i> Mis Salas Favoritas
        </h2>
        <div id="contenedor-favoritos" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </section>

    <section>
        <h2 id="titulo-explorar" class="text-2xl font-bold text-gray-700 mb-6">Explorar Salas</h2>
        <div id="contenedor-salas" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="col-span-full text-center py-10"><i class="fas fa-spinner fa-spin text-3xl text-blue-500"></i></div>
        </div>
    </section>
</main>

<script type="module" src="js/index.js"></script>
</body>
</html>
