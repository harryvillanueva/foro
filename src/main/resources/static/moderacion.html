<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Panel de Moderación</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-100 min-h-screen">
<nav class="bg-orange-600 text-white shadow-lg p-4">
  <div class="max-w-6xl mx-auto flex justify-between items-center">
    <h1 class="font-bold text-xl"><i class="fas fa-shield-halved"></i> Panel de Moderación</h1>
    <a href="index.html" class="underline">Volver al Inicio</a>
  </div>
</nav>

<main class="max-w-6xl mx-auto py-8 px-4 grid grid-cols-1 md:grid-cols-4 gap-6">
  <div class="md:col-span-1 bg-white p-4 rounded-lg shadow h-fit">
    <h2 class="font-bold text-gray-700 mb-4 border-b pb-2">Mis Salas Asignadas</h2>
    <div id="listaMisSalas" class="space-y-3"></div>
  </div>

  <div class="md:col-span-3">
    <h2 class="text-2xl font-bold text-gray-800 mb-4" id="tituloModeracion">Selecciona una sala para moderar</h2>

    <div id="contenedorPendientes" class="space-y-4 mb-8">
      <p class="text-gray-500 italic">Aquí aparecerán los mensajes pendientes y los usuarios suscritos.</p>
    </div>

    <h3 id="tituloParticipantes" class="text-xl font-bold text-gray-800 mb-4 hidden border-t border-gray-300 pt-8"><i class="fas fa-users text-blue-500 mr-2"></i> Participantes Suscritos (Bloqueo Directo)</h3>
    <div id="contenedorParticipantes" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
  </div>
</main>

<script type="module" src="js/moderacion.js"></script>
</body>
</html>
