<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Foro DAW - Debate</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-100 min-h-screen">

<nav class="bg-blue-900 text-white shadow-lg p-4">
  <div class="max-w-4xl mx-auto flex justify-between items-center">
    <h1 class="font-bold text-xl"><i class="fas fa-comments"></i> Foro DAW</h1>
    <button id="btnVolverSala" class="hover:text-gray-300 underline"><i class="fas fa-arrow-left"></i> Volver a la Sala</button>
  </div>
</nav>

<main class="max-w-4xl mx-auto py-8 px-4">

  <div id="contenedorPregunta" class="bg-white p-6 rounded-lg shadow-md mb-8 border-l-4 border-blue-800">
    <p class="text-gray-500 italic">Cargando pregunta...</p>
  </div>

  <div class="mb-8 pl-4 md:pl-10 border-l-2 border-gray-300">
    <h3 class="text-lg font-bold text-gray-700 mb-4"><i class="fas fa-reply-all"></i> Respuestas</h3>
    <div id="listaRespuestas" class="space-y-4">
    </div>
  </div>

  <div class="bg-gray-50 p-6 rounded-lg shadow-inner border border-gray-200">
    <h4 class="font-bold text-gray-800 mb-2">Añadir una respuesta</h4>
    <form id="formResponder">
      <textarea id="contenidoRespuesta" required rows="3" class="w-full border p-3 rounded focus:ring focus:ring-blue-200 focus:outline-none" placeholder="Escribe tu respuesta o comentario..."></textarea>
      <div class="flex justify-between items-center mt-3">
        <p id="alertaModeracion" class="text-sm text-orange-600 hidden"><i class="fas fa-info-circle"></i> Esta sala está moderada. Tu respuesta requerirá aprobación.</p>
        <button type="submit" class="bg-blue-600 text-white px-6 py-2 rounded font-bold hover:bg-blue-700 transition ml-auto">Publicar Respuesta</button>
      </div>
    </form>
    <div id="mensajeAlerta" class="hidden mt-4"></div>
  </div>

</main>

<script type="module" src="js/pregunta.js"></script>
</body>
</html>
