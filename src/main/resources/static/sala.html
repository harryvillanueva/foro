<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Foro DAW - Sala</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-100 min-h-screen">

<nav class="bg-blue-900 text-white shadow-lg p-4">
    <div class="max-w-4xl mx-auto flex justify-between items-center">
        <h1 class="font-bold text-xl"><i class="fas fa-comments"></i> Foro DAW</h1>
        <a href="index.html" class="hover:text-gray-300 underline"><i class="fas fa-arrow-left"></i> Volver a Salas</a>
    </div>
</nav>

<main class="max-w-4xl mx-auto py-8 px-4">

    <div class="bg-white p-6 rounded-lg shadow-md mb-8 border-l-4 border-blue-600">
        <h2 id="tituloSala" class="text-3xl font-extrabold text-gray-800">Cargando sala...</h2>
        <p id="infoSala" class="text-gray-500 mt-2 font-medium"></p>
    </div>

    <div class="bg-white p-6 rounded-lg shadow-md mb-8">
        <h3 class="text-lg font-bold text-gray-800 mb-4">Formular una nueva pregunta</h3>
        <form id="formPregunta">
            <textarea id="contenidoPregunta" required rows="3" class="w-full border p-3 rounded focus:ring focus:ring-blue-200 focus:outline-none" placeholder="Escribe tu duda aquí..."></textarea>
            <button type="submit" class="mt-3 bg-blue-600 text-white px-6 py-2 rounded font-bold hover:bg-blue-700 transition">Publicar Pregunta</button>
        </form>
        <div id="mensajeAlerta" class="hidden mt-4"></div>
    </div>

    <div>
        <h3 class="text-xl font-bold text-gray-800 mb-4 border-b pb-2">Preguntas Recientes</h3>
        <div id="listaPreguntas" class="space-y-4">
        </div>
    </div>

</main>

<script type="module" src="js/sala.js"></script>
</body>
</html>
