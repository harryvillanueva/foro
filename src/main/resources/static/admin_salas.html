<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel Admin - Gestión de Salas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50 min-h-screen">
<nav class="bg-blue-800 p-4 text-white flex justify-between shadow-lg">
    <h1 class="font-bold text-xl">Foro DAW - Administración</h1>
    <div class="flex gap-4">
        <a href="admin_moderadores.html" class="underline hover:text-blue-200">Moderadores</a>
        <a href="index.html" class="underline hover:text-blue-200">Volver al Inicio</a>
    </div>
</nav>

<div class="max-w-6xl mx-auto p-6 grid grid-cols-1 md:grid-cols-3 gap-8">
    <div class="bg-white p-6 rounded-lg shadow-md h-fit md:col-span-1">
        <h2 class="text-xl font-bold mb-4">Crear Nueva Sala</h2>
        <form id="formCrearSala" class="space-y-4">
            <div>
                <label class="block text-sm font-bold mb-1">Nombre de la Sala</label>
                <input type="text" id="nombreSala" required class="w-full border p-2 rounded focus:ring-2 focus:ring-blue-400">
            </div>
            <div>
                <label class="block text-sm font-bold mb-1">Temática</label>
                <input type="text" id="tematicaSala" required class="w-full border p-2 rounded focus:ring-2 focus:ring-blue-400">
            </div>
            <div class="flex items-center">
                <input type="checkbox" id="modSala" class="w-4 h-4 text-blue-600 bg-gray-100 border-gray-300 rounded focus:ring-blue-500">
                <label for="modSala" class="ml-2 text-sm font-medium text-gray-900">Requiere Moderación (Aprobación previa)</label>
            </div>
            <button type="submit" class="w-full bg-blue-600 text-white p-2 rounded font-bold hover:bg-blue-700">Crear Sala</button>
        </form>
        <div id="mensajeAlerta" class="hidden mt-4"></div>
    </div>

    <div class="bg-white p-6 rounded-lg shadow-md md:col-span-2">
        <h2 class="text-xl font-bold mb-4">Salas Existentes</h2>
        <table class="w-full text-left border-collapse border border-gray-200">
            <thead>
            <tr class="bg-gray-100">
                <th class="p-3 border">Nombre</th>
                <th class="p-3 border">Temática</th>
                <th class="p-3 border text-center">Moderación</th>
                <th class="p-3 border">Moderador Asignado</th>
                <th class="p-3 border text-center">Acciones</th> </tr>
            </thead>
            <tbody id="listaSalas">
            </tbody>
        </table>
    </div>
</div>

<script type="module" src="js/admin_salas.js"></script>
</body>
</html>
