<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel Admin - Gestión de Salas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50 dark:bg-gray-900 transition-colors duration-300 min-h-screen">

<nav class="bg-blue-900 dark:bg-black text-white shadow-lg transition-colors duration-300">
    <div class="max-w-7xl mx-auto px-4">
        <div class="flex justify-between items-center h-16">
            <div class="flex items-center space-x-2"><i class="fas fa-comments text-2xl text-blue-300"></i><span class="font-bold text-xl tracking-tight">Foro DAW</span></div>
            <div class="hidden md:flex items-center space-x-6" id="nav-links">
                <a href="index.html" class="hover:text-blue-300 transition" data-i18n="nav.inicio"><i class="fas fa-home mr-1"></i> Inicio</a>
                <a href="admin_salas.html" id="link-admin-salas" class="hidden hover:text-blue-300 transition" data-i18n="nav.salas"><i class="fas fa-layer-group mr-1"></i> Gestión Salas</a>
                <a href="admin_moderadores.html" id="link-admin-mods" class="hidden hover:text-blue-300 transition" data-i18n="nav.mods"><i class="fas fa-user-shield mr-1"></i> Moderadores</a>
                <a href="admin_usuarios.html" id="link-admin-users" class="hidden hover:text-blue-300 transition" data-i18n="nav.usuarios"><i class="fas fa-users-cog mr-1"></i> Usuarios</a>
                <a href="moderacion.html" id="link-moderacion" class="hidden hover:text-blue-300 transition" data-i18n="nav.modPanel"><i class="fas fa-shield-halved mr-1"></i> Moderación</a>
                <a href="perfil.html" class="hover:text-blue-300 transition" data-i18n="nav.perfil"><i class="fas fa-user mr-1"></i> Mi Perfil</a>
                <div class="flex items-center border-l border-blue-700 pl-4 space-x-3">
                    <button id="btn-lang-es" class="text-xs font-bold hover:text-blue-300 px-1">ES</button><span class="text-gray-500">|</span><button id="btn-lang-en" class="text-xs font-bold hover:text-blue-300 px-1">EN</button>
                    <button id="btn-tema" class="text-lg hover:scale-110 transition-transform ml-2 px-2"><i class="fas fa-moon"></i></button>
                </div>
                <div class="flex items-center border-l border-blue-700 pl-4 space-x-4">
                    <span id="user-display" class="text-sm font-medium text-blue-200">Invitado</span>
                    <button id="btn-logout" class="bg-red-600 hover:bg-red-700 px-3 py-1 rounded text-sm transition" data-i18n="nav.salir"><i class="fas fa-sign-out-alt"></i> Salir</button>
                </div>
            </div>
        </div>
    </div>
</nav>

<div class="max-w-6xl mx-auto p-6 grid grid-cols-1 md:grid-cols-3 gap-8 mt-4">
    <div class="bg-white dark:bg-gray-800 p-6 rounded-lg shadow-md h-fit md:col-span-1 border border-gray-200 dark:border-gray-700 transition-colors">
        <h2 class="text-xl font-bold mb-4 dark:text-white">Crear Nueva Sala</h2>
        <form id="formCrearSala" class="space-y-4">
            <div>
                <label class="block text-sm font-bold mb-1 dark:text-gray-300">Nombre</label>
                <input type="text" id="nombreSala" required class="w-full border dark:border-gray-600 bg-white dark:bg-gray-700 dark:text-white p-2 rounded">
            </div>
            <div>
                <label class="block text-sm font-bold mb-1 dark:text-gray-300">Temática</label>
                <input type="text" id="tematicaSala" required class="w-full border dark:border-gray-600 bg-white dark:bg-gray-700 dark:text-white p-2 rounded">
            </div>
            <div class="flex items-center">
                <input type="checkbox" id="modSala" class="w-4 h-4">
                <label class="ml-2 text-sm font-medium dark:text-gray-300">Requiere Moderación</label>
            </div>
            <button type="submit" class="w-full bg-blue-600 text-white p-2 rounded font-bold hover:bg-blue-700">Crear Sala</button>
        </form>
        <div id="mensajeAlerta" class="hidden mt-4"></div>
    </div>

    <div class="bg-white dark:bg-gray-800 p-6 rounded-lg shadow-md md:col-span-2 border border-gray-200 dark:border-gray-700 overflow-x-auto transition-colors">
        <h2 class="text-xl font-bold mb-4 dark:text-white">Salas Existentes</h2>
        <table class="w-full text-left border-collapse border border-gray-200 dark:border-gray-700">
            <thead>
            <tr class="bg-gray-100 dark:bg-gray-700 dark:text-white">
                <th class="p-3 border dark:border-gray-600">Nombre</th>
                <th class="p-3 border dark:border-gray-600">Temática</th>
                <th class="p-3 border dark:border-gray-600 text-center">Mod.</th>
                <th class="p-3 border dark:border-gray-600 text-center">Acciones</th>
            </tr>
            </thead>
            <tbody id="listaSalas" class="dark:text-gray-300"></tbody>
        </table>
    </div>
</div>
<script type="module" src="js/admin_salas.js"></script>
</body>
</html>
