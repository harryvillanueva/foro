<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Mi Perfil - Foro DAW</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50 min-h-screen">
<nav class="bg-blue-900 text-white p-4 shadow-lg">
  <div class="max-w-5xl mx-auto flex justify-between items-center">
    <h1 class="font-bold text-xl"><i class="fas fa-user-circle"></i> Mi Perfil</h1>
    <a href="index.html" class="underline">Volver al Inicio</a>
  </div>
</nav>

<main class="max-w-5xl mx-auto py-10 px-4 grid grid-cols-1 md:grid-cols-3 gap-8">
  <div class="md:col-span-1">
    <h2 class="text-xl font-bold text-gray-800 mb-4"><i class="fas fa-bell text-orange-500"></i> Notificaciones</h2>
    <div id="listaNotificaciones" class="space-y-3"></div>
  </div>

  <div class="md:col-span-2">
    <h2 class="text-xl font-bold text-gray-800 mb-4"><i class="fas fa-history text-blue-500"></i> Mi Actividad</h2>
    <div id="listaHistorial" class="space-y-4"></div>
  </div>
</main>

<script type="module" src="js/perfil.js"></script>
</body>
</html>
